    <style id="hamburger-menu-fix">
      /* Clean Hamburger Menu Button */
      .hamburger-btn {
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        width: 44px !important;
        height: 44px !important;
        background: rgba(245, 235, 221, 0.1) !important;
        border: 1px solid rgba(245, 235, 221, 0.2) !important;
        border-radius: 8px !important;
        cursor: pointer !important;
        position: relative !important;
        z-index: 101 !important;
        transition: all 0.3s ease !important;
      }
      .hamburger-btn:hover {
        background: rgba(245, 235, 221, 0.15) !important;
        border-color: rgba(245, 235, 221, 0.3) !important;
      }
      .hamburger-btn .line {
        display: block !important;
        width: 22px !important;
        height: 2px !important;
        background: #F5EBDD !important;
        margin: 3px 0 !important;
        border-radius: 1px !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
      .hamburger-btn.active .line:first-child {
        transform: translateY(8px) rotate(45deg) !important;
      }
      .hamburger-btn.active .line:nth-child(2) {
        opacity: 0 !important;
        transform: scaleX(0) !important;
      }
      .hamburger-btn.active .line:last-child {
        transform: translateY(-8px) rotate(-45deg) !important;
      }
      /* Hide default React hamburger, use our custom one */
      @media (min-width: 768px) {
        button[class*="md:hidden"] {
          display: none !important;
        }
      }
      @media (max-width: 767px) {
        button[class*="md:hidden"][class*="flex-col"] {
          all: unset !important;
          display: flex !important;
          flex-direction: column !important;
          justify-content: center !important;
        align-items: center !important;
        width: 44px !important;
        height: 44px !important;
        background: rgba(245, 235, 221, 0.08) !important;
        border: 1px solid rgba(245, 235, 221, 0.15) !important;
        border-radius: 8px !important;
        cursor: pointer !important;
        position: relative !important;
        z-index: 101 !important;
        gap: 5px !important;
      }
      button[class*="md:hidden"][class*="flex-col"] > span {
        display: block !important;
        width: 20px !important;
        height: 2px !important;
        background: #F5EBDD !important;
        border-radius: 1px !important;
        transition: all 0.3s ease !important;
        margin: 0 !important;
      }
      }
    </style>
    <style id="navbar-elevated">
      /* ========================================
         ELEVATED NAVBAR DESIGN
         ======================================== */

      /* Main Navbar */
      nav,
      nav.fixed {
        background: rgba(27, 22, 18, 0.85) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-bottom: 1px solid rgba(245, 235, 221, 0.08) !important;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3) !important;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }

      /* Navbar when scrolled */
      nav.bg-bg-primary {
        background: rgba(27, 22, 18, 0.95) !important;
        border-bottom: 1px solid rgba(245, 235, 221, 0.12) !important;
      }

      /* Logo */
      nav .font-display.text-2xl {
        font-family: 'Cormorant Garamond', serif !important;
        font-size: 1.5rem !important;
        font-weight: 400 !important;
        letter-spacing: 0.3em !important;
        color: #F5EBDD !important;
        transition: all 0.3s ease !important;
      }

      nav .font-display.text-2xl:hover {
        color: #B87935 !important;
        letter-spacing: 0.35em !important;
      }

      /* Nav Links */
      nav .hidden.md\\:flex a {
        font-family: 'DM Sans', sans-serif !important;
        font-size: 0.7rem !important;
        font-weight: 500 !important;
        letter-spacing: 0.15em !important;
        text-transform: uppercase !important;
        padding: 0.5rem 0 !important;
        position: relative !important;
        transition: all 0.3s ease !important;
      }

      nav .hidden.md\\:flex a::after {
        content: '' !important;
        position: absolute !important;
        bottom: 0 !important;
        left: 0 !important;
        width: 0 !important;
        height: 1px !important;
        background: #B87935 !important;
        transition: width 0.3s ease !important;
      }

      nav .hidden.md\\:flex a:hover::after {
        width: 100% !important;
      }

      /* Book Now Button in Navbar */
      nav .btn-primary {
        background: linear-gradient(135deg, #B87935 0%, #D99A4E 100%) !important;
        color: #1B1612 !important;
        border: none !important;
        border-radius: 6px !important;
        padding: 0.625rem 1.25rem !important;
        font-size: 0.65rem !important;
        font-weight: 600 !important;
        letter-spacing: 0.12em !important;
        box-shadow: 0 2px 10px rgba(184, 121, 53, 0.3) !important;
        transition: all 0.3s ease !important;
      }

      nav .btn-primary:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 4px 20px rgba(184, 121, 53, 0.4) !important;
      }

      /* Hamburger Button */
      nav button.md\\:hidden {
        width: 44px !important;
        height: 44px !important;
        background: rgba(245, 235, 221, 0.05) !important;
        border: 1px solid rgba(245, 235, 221, 0.15) !important;
        border-radius: 8px !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        gap: 5px !important;
        cursor: pointer !important;
        transition: all 0.3s ease !important;
      }

      nav button.md\\:hidden:hover {
        background: rgba(245, 235, 221, 0.1) !important;
        border-color: rgba(245, 235, 221, 0.25) !important;
      }

      nav button.md\\:hidden span {
        display: block !important;
        width: 20px !important;
        height: 2px !important;
        background: #F5EBDD !important;
        border-radius: 1px !important;
        transition: all 0.3s ease !important;
      }
    </style>
    <style id="review-section-fix">

      .bg-bg-inverse {

        border: 1px solid rgba(245, 235, 221, 0.15) !important;
      }
      .text-accent {
        color: #B87935 !important;
      }

      /* Motion Timing Tokens - Distinct easing for different purposes */
      :root {
        /* Entrance animations - dramatic, overshoot */
        --ease-entrance: cubic-bezier(0.16, 1, 0.3, 1);
        /* Micro-interactions - snappy, responsive */
        --ease-micro: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        /* UI transitions - smooth, natural */
        --ease-ui: cubic-bezier(0.4, 0, 0.2, 1);
        /* Exit animations - quick, no overshoot */
        --ease-exit: cubic-bezier(0.4, 0, 1, 1);

        /* Duration scale */
        --duration-instant: 0.15s;
        --duration-fast: 0.3s;
        --duration-normal: 0.5s;
        --duration-slow: 0.8s;
        --duration-slower: 1.2s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .animate-in {
        animation: fadeIn var(--duration-fast) var(--ease-micro) forwards;
      }

      /* Text selection */
      ::selection {
        background: rgba(140, 130, 112, 0.2);
        color: var(--color-text-primary);
      }

      /* HIGH: Hero subtitle contrast fix - use full white */
      .hero-subhead {
        color: #ffffff !important;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      /* HIGH: Nav links contrast on transparent hero nav */
      .nav-link {
        color: #ffffff !important;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }

      /* HIGH: Hero headline line-height for descenders */
      .hero-headline h1,
      .hero-headline .h1 {
        line-height: 1.15 !important;
      }

      /* HIGH: Booking bar date input placeholder contrast */
      input::placeholder,
      textarea::placeholder {
        color: var(--color-text-muted, #6b7280) !important;
        opacity: 1;
      }

      /* HIGH: Cursor fallback for form controls */
      input,
      textarea,
      select,
      button {
        cursor: auto !important;
      }

      button[type="submit"],
      .btn-primary,
      .btn-ghost {
        cursor: pointer !important;
      }

      /* MEDIUM: Accent color for dark backgrounds */
      :root {
        --color-accent-dark: #b8a890;
      }

      .bg-bg-inverse .nav-link.active::after,
      .bg-bg-inverse .accent,
      footer .accent,
      footer .nav-link.active::after {
        background: var(--color-accent-dark) !important;
        color: var(--color-accent-dark) !important;
      }

      /* MEDIUM: Section padding minimum increased */
      .container-fluid {
        padding-left: max(1.5rem, 5vw);
        padding-right: max(1.5rem, 5vw);
      }

      /* MEDIUM: Fix tracking on small labels */
      .text-xs.tracking-\[0\.2em\],
      .tracking-\[0\.2em\].text-xs {
        letter-spacing: 0.05em !important;
      }

      /* Input autofill override */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 1000px var(--color-surface) inset;
        -webkit-text-fill-color: var(--color-text-primary);
        transition: background-color 5000s ease-in-out 0s;
      }

      /* Smooth image loading */
      img {
        transition: opacity 0.3s ease;
      }
      img[loading="lazy"] {
        opacity: 0;
      }
      img[loading="lazy"].loaded {
        opacity: 1;
      }

      /* Section separator line */
      .section-sep {
        width: 40px;
        height: 1px;
        background: var(--color-accent);
        display: block;
        margin-bottom: 2rem;
      }

      /* Typography tightening */
      .font-display {
        font-feature-settings:
          "liga" 1,
          "kern" 1,
          "onum" 1;
      }
      h1.font-display {
        letter-spacing: -0.03em;
      }
      h2.font-display {
        letter-spacing: -0.02em;
      }

      /* Contact floating label */
      .form-field-wrapper {
        position: relative;
        padding-top: 1.5rem;
      }
      .form-label {
        position: absolute;
        top: 1.5rem;
        left: 1rem;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--color-text-muted);
        pointer-events: none;
        transition: all var(--duration-base) var(--ease-out-quart);
        transform-origin: left top;
      }
      .form-input:focus ~ .form-label,
      .form-input:not(:placeholder-shown) ~ .form-label {
        transform: translateY(-1.4rem) ;
        color: var(--color-accent);
      }
      .form-input {
        width: 100%;
        padding: 0.875rem 1rem;
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 0;
        font-family: var(--font-body), sans-serif;
        font-size: 0.875rem;
        color: var(--color-text-primary);
        transition: border-color var(--duration-base) var(--ease-out-quart);

      .form-input:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(140, 130, 112, 0.12);

      /* Room card hover */
      .room-card {
        flex-shrink: 0 !important;
        transition:
          transform var(--duration-slow) var(--ease-out-expo),
          box-shadow var(--duration-slow) var(--ease-out-expo),
          border-color var(--duration-base) var(--ease-out-quart);

      .room-card:hover {
        transform: translateY(-10px) !important;
        box-shadow: var(--shadow-xl) !important;

      /* ========================================
         ROOMS & GALLERY SECTION COLOR HARMONY
         ======================================== */

      /* Rooms Page - Warm Dark Espresso Interior */
      .rooms-page,
      main.bg-bg-primary:has(.reveal-up[data-room-category]),
      main.bg-bg-primary:has(section[class*="container-fluid"]:has(.room-card)) {
        background: linear-gradient(
          180deg,
          #1B1612 0%,
          #1A1510 50%,
          #19130E 100%
        ) !important;

      .room-card-wrapper,
      section.container-fluid:has(.room-card) {
        background: transparent !important;

      /* Individual room cards - warm card surface */
      .room-card {
        background: linear-gradient(
          145deg,
          rgba(33, 26, 21, 0.95) 0%,
          rgba(30, 24, 19, 0.9) 100%
        ) !important;
        backdrop-filter: blur(8px) !important;
        border: 1px solid rgba(245, 235, 221, 0.12) !important;

      /* Gallery Page - Darker Showcase Base */
      .gallery-page,
      main.bg-bg-primary:has(.gallery-item) {
        background: linear-gradient(
          180deg,
          #120F0C 0%,
          #15110E 50%,
          #181410 100%
        ) !important;

      /* Gallery container - seamless with page */
      section.container-fluid:has(.gallery-item) {
        background: transparent !important;

      /* Gallery items - enhanced prominence against darker bg */
      .gallery-item {
        border: 1px solid rgba(245, 235, 221, 0.06) !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3) !important;
      }

      .gallery-item:hover {
        border-color: rgba(184, 121, 53, 0.3) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
      }

      /* Gallery filter tabs - subtle contrast */
      .gallery-page .border-b.border-border,
      main:has(.gallery-item) .border-b.border-border {
        border-color: rgba(245, 235, 221, 0.06) !important;
      }

      /* Booking bar dividers */
      .booking-field:focus-within {
        background-color: rgba(140, 130, 112, 0.04);
      }
      .booking-divider {
        width: 1px;
        background: var(--color-border);
        transition: background var(--duration-base) var(--ease-out-quart);
      }
      .booking-field:hover + .booking-divider,
      .booking-field:focus-within + .booking-divider {
        background: var(--color-accent);

      /* Footer watermark unselectable */
      .footer-watermark {
        user-select: none;
        -webkit-user-select: none;

        position: relative;
        background: linear-gradient(
          135deg,
          var(--color-accent) 0%,

        color: white;
        padding: 1rem 2rem;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: none;

        transition: all var(--duration-normal) var(--ease-entrance);

      a[href*="contact"]:not(.nav-link):hover,
      button[type="submit"]:hover {
        transform: translateY(-2px);

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Wait for React to mount and GSAP to be available
        setTimeout(() => {
          if (!window.gsap || !window.ScrollTrigger) return;

          // 1. Global Motion Bus
          if (window.lenis) {
            window.lenis.on("scroll", (e) => {
              const velocity = gsap.utils.clamp(-80, 80, e.velocity || 0);
              document.documentElement.style.setProperty("--scroll", e.scroll);
              document.documentElement.style.setProperty(
                "--velocity",
                velocity,
              );
              document.documentElement.style.setProperty(
                "--direction",
                e.direction,
              );
              document.documentElement.style.setProperty(
                "--progress",
                e.progress,
              );

              // Velocity distortions for images
              gsap.to(
                'img.velocity-image, .room-card img, a[href^="/rooms/"] img',
                {
                  skewY: velocity * 0.015,
                  y: velocity * -0.05,
                  duration: 0.45,
                  ease: "power3.out",
                  overwrite: "auto",
                },
              );
            });
          }

          // N1: Nav scroll progress
          const progress = document.getElementById("nav-progress");
          if (progress) {
            window.addEventListener(
              "scroll",
              () => {
                const scrolled = window.scrollY;
                const total =
                  document.documentElement.scrollHeight - window.innerHeight;
                if (total > 0) {
                  progress.style.transform = `scaleX(${scrolled / total})`;
                }
              },
              { passive: true },
            );
          }

          // 2. TextMotionEngine: Replaces hacky H2 mutation
          class TextMotionEngine {
            constructor(selector) {
              this.elements = document.querySelectorAll(selector);
              this.init();
            }
            init() {
              this.elements.forEach((el) => {
                if (
                  el.hasAttribute("data-motion-applied") ||
                  el.childNodes.length > 1
                )
                  return;
                el.setAttribute("data-motion-applied", "true");
                const text = el.innerText.trim();
                if (!text) return;

                const words = text.split(/\s+/);
                el.innerHTML = "";
                el.style.perspective = "400px";

                words.forEach((word, index) => {
                  const span = document.createElement("span");
                  span.style.display = "inline-block";
                  span.style.overflow = "hidden";
                  span.style.verticalAlign = "top";
                  span.style.marginRight = "0.25em";

                  const innerSpan = document.createElement("span");
                  innerSpan.innerText = word;
                  innerSpan.style.display = "inline-block";
                  innerSpan.style.transform =
                    "translateY(120%) rotateX(-20deg)";
                  innerSpan.style.transformOrigin = "bottom center";
                  innerSpan.classList.add("motion-word");

                  span.appendChild(innerSpan);
                  el.appendChild(span);
                });

                gsap.to(el.querySelectorAll(".motion-word"), {
                  y: "0%",
                  rotateX: 0,
                  ease: "power4.out",
                  duration: 1.4,
                  stagger: 0.03,
                  scrollTrigger: {
                    trigger: el,
                    start: "top 85%",
                  },
                });
              });
            }
          }
          new TextMotionEngine("h2, .split-heading");

          // 3. Scene Architecture Overrides

          // A. Hero Pinned Scene Removed

          // B. Rooms Horizontal Track
          // Identify Rooms container by finding room links
          const roomLinks = Array.from(
            document.querySelectorAll('a[href^="/rooms/"]'),
          );
          if (roomLinks.length > 0) {
            // Find common ancestor grid
            let roomsGrid = roomLinks[0].parentElement;
            while (
              roomsGrid &&
              getComputedStyle(roomsGrid).display !== "grid" &&
              getComputedStyle(roomsGrid).display !== "flex"
            ) {
              if (roomsGrid.tagName === "BODY") {
                roomsGrid = null;
                break;
              }
              roomsGrid = roomsGrid.parentElement;
            }

            if (roomsGrid && window.innerWidth > 768) {
              const roomsScene = roomsGrid.parentElement;
              roomsScene.classList.add("rooms-scene");
              roomsGrid.classList.add("rooms-track");
              roomsGrid.style.display = "flex";
              roomsGrid.style.flexWrap = "nowrap";
              roomsGrid.style.width = "max-content";
              roomsGrid.style.gap = "4rem";
              roomsGrid.style.paddingLeft = "5vw";

              // Remove old grid styles
              roomsGrid.style.gridTemplateColumns = "none";

              gsap.to(roomsGrid, {
                x: () => -(roomsGrid.scrollWidth - window.innerWidth + 200),
                ease: "none",
                scrollTrigger: {
                  trigger: roomsScene,
                  start: "top top",
                  end: () => `+=${roomsGrid.scrollWidth}`,
                  scrub: 1,
                  pin: true,
                  invalidateOnRefresh: true,
                  anticipatePin: 1,
                },
              });

              // Add subtle off-white background transition as the user scrolls horizontally through the expensive rooms
              gsap.to(roomsScene, {
                backgroundColor: "#faf9f6", // subtle off-white
                ease: "power1.inOut",
                scrollTrigger: {
                  trigger: roomsScene,
                  start: "top top",
                  end: () => `+=${roomsGrid.scrollWidth}`,
                  scrub: true,
                },
              });
            }
          }

          // 4. Micro-Interactions
          // Magnetic Button Effect
          if (window.matchMedia("(min-width: 768px)").matches) {

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Wait for React to render the nav
    setTimeout(() => {
      const nav = document.querySelector('nav') || document.querySelector('header');
      if (nav) {
        // Remove the static !important from CSS by resetting them inline, or we can just use setProperty
        const updateNav = () => {
          const scrollY = window.scrollY;
          // Dissolve smoothly over the first 300 pixels
          const progress = Math.min(scrollY / 300, 1);
          
          const bgAlpha = progress * 0.55;
          const blur = progress * 12;
          const borderAlpha = progress * 0.1;
          
          nav.style.setProperty('background', `rgba(27, 22, 18, ${bgAlpha})`, 'important');
          nav.style.setProperty('backdrop-filter', `blur(${blur}px) saturate(150%)`, 'important');
          nav.style.setProperty('-webkit-backdrop-filter', `blur(${blur}px) saturate(150%)`, 'important');
          nav.style.setProperty('border-bottom', `1px solid rgba(245, 235, 221, ${borderAlpha})`, 'important');
        };
        
        // Initial call
        updateNav();
        
        // Use requestAnimationFrame for buttery smooth pixel-by-pixel updates
        let ticking = false;
        window.addEventListener('scroll', () => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              updateNav();
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      }
    }, 1500);
  });
</script>

         if (heroSection) {
            const bgDiv = heroSection.querySelector('.hero-cinema-bg');

            if (bgDiv) {
              gsap.fromTo(bgDiv, 
                { opacity: 0 },

              );
              
              // Hero Image Carousel - 5 second intervals, gentle crossfade
              const slides = bgDiv.querySelectorAll('.hero-slide');
              if (slides.length > 1) {
                let currentSlide = 0;
                setInterval(() => {
                  slides[currentSlide].classList.remove('active');
                  currentSlide = (currentSlide + 1) % slides.length;
                  slides[currentSlide].classList.add('active');
                }, 5000);
              }
            }

            // 2. Calm Text Reveals (supplementary — React GSAP handles primary animation)
            if (contentCol) {
               const trustLine = contentCol.querySelector('.hero-trust-line');

                   { y: 10, opacity: 0 },

                 );

<script>
(function() {
  // ========================================
  // AGGRESSIVE CONTACT NAV FIX
  // Forces Contact link to black, re-applying after React re-renders
  // ========================================

  function forceContactBlack() {
    // Find Contact links and apply the highlight class
    document.querySelectorAll('nav a, header a, .mobile-menu a').forEach(link => {
      if (link.textContent.trim() === 'Contact') {
        link.classList.add('nav-contact-highlight');
      }
    });
  }
  
  // Run immediately and repeatedly
  forceContactBlack();
  setTimeout(forceContactBlack, 500);
  setTimeout(forceContactBlack, 1000);
  setTimeout(forceContactBlack, 2000);
  setTimeout(forceContactBlack, 3000);
  setTimeout(forceContactBlack, 5000);
  
  // Use MutationObserver to fight React
  const contactObserver = new MutationObserver(() => {
    forceContactBlack();
  });
  
  const startContactObserver = () => {
    const root = document.getElementById('root') || document.body;
    contactObserver.observe(root, { childList: true, subtree: true });
    // Keep running for 15 seconds to catch all re-renders
    setTimeout(() => contactObserver.disconnect(), 15000);
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startContactObserver);
  } else {
    startContactObserver();
  }
})();
</script>

  /* Reduced motion */

<script>
  // Page Loader
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('pageLoader').classList.add('hidden');
    }, 800);
  });

  // Contact Modal Functions
  function openContactModal() {
    document.getElementById('contactModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeContactModal() {
    document.getElementById('contactModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  
  // Close modal on overlay click
  document.getElementById('contactModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeContactModal();
  });

  // ========================================
  // ROOM AVAILABILITY MODAL
  // ========================================

  // NOTE: This is a STATIC availability map for demonstration purposes.
  // In production, this should be replaced with real-time availability
  // from a backend/admin system. Currently manually maintained.
  const roomAvailability = {
    // Budget Twin Bed - Rs 600
    "105": "available",
    "205": "booked",
    // Standard Twin Bed - Rs 800
    "101": "available",
    "102": "available",
    "103": "booked",
    "104": "available",
    "106": "available",
    "107": "available",
    "108": "booked",
    "109": "available",
    "110": "available",
    // Standard Triple Bed - Rs 800
    "208": "available",
    "210": "available",
    // Premium Twin Bed - Rs 1000
    "207": "available",
    "209": "booked",
    // King Size AC - Rs 1800
    "203": "available",
    "204": "available",
    "206": "booked",
    // Family Suite - Rs 2200
    "201": "available"
  };

  // Room category data - maps category to room numbers
  const roomCategories = {
    "budget-twin": {
      name: "Budget Twin Bed",
      rooms: ["105", "205"]
    },
    "standard-twin": {
      name: "Standard Twin Bed",
      rooms: ["101", "102", "103", "104", "106", "107", "108", "109", "110"]
    },
    "standard-triple": {
      name: "Standard Triple Bed",
      rooms: ["208", "210"]
    },
    "premium-twin": {
      name: "Premium Twin Bed",
      rooms: ["207", "209"]
    },
    "king-ac": {
      name: "King Size AC",
      rooms: ["203", "204", "206"]
    },
    "family-suite": {
      name: "Family Suite",
      rooms: ["201"]
    }
  };

  let selectedRoomNumber = null;

  // Open availability modal for a specific category
  function openAvailabilityModal(categoryKey) {
    const category = roomCategories[categoryKey];
    if (!category) return;

    const modal = document.getElementById('availabilityModal');
    const title = document.getElementById('availabilityTitle');
    const roomsContainer = document.getElementById('availabilityRooms');

    // Set title
    title.textContent = category.name + ' Availability';

    // Clear and populate rooms
    roomsContainer.innerHTML = '';

    category.rooms.forEach(roomNum => {
      const status = roomAvailability[roomNum] || 'available';
      const chip = document.createElement('div');
      chip.className = `room-chip ${status}`;
      chip.innerHTML = `
        <span class="room-number">${roomNum}</span>
        <span class="room-status">${status === 'available' ? 'Available' : 'Booked'}</span>
      `;

      if (status === 'available') {
        chip.addEventListener('click', () => selectRoom(roomNum));
      }

      roomsContainer.appendChild(chip);
    });

    // Show modal
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  // Close availability modal
  function closeAvailabilityModal() {
    const modal = document.getElementById('availabilityModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Select a room and proceed to booking
  function selectRoom(roomNum) {
    selectedRoomNumber = roomNum;
    closeAvailabilityModal();

    // Open contact modal and preselect the room
    openContactModal();

    // Preselect the room in the dropdown
    setTimeout(() => {
      const roomSelect = document.querySelector('select[name="room"]');
      if (roomSelect) {
        roomSelect.value = roomNum;
      }
    }, 100);
  }

  // Close availability modal on overlay click
  document.getElementById('availabilityModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeAvailabilityModal();
  });

  // Map room numbers to category keys
  const roomToCategory = {
    "105": "budget-twin", "205": "budget-twin",
    "101": "standard-twin", "102": "standard-twin", "103": "standard-twin",
    "104": "standard-twin", "106": "standard-twin", "107": "standard-twin",
    "108": "standard-twin", "109": "standard-twin", "110": "standard-twin",
    "208": "standard-triple", "210": "standard-triple",
    "207": "premium-twin", "209": "premium-twin",
    "203": "king-ac", "204": "king-ac", "206": "king-ac",
    "201": "family-suite"
  };

  // Attach click handlers to room card Book Now buttons
  function initRoomBookButtons() {
    document.querySelectorAll('.room-book-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const roomList = this.getAttribute('data-room-category');
        if (roomList) {
          const rooms = roomList.split(',');
          const firstRoom = rooms[0].trim();
          const categoryKey = roomToCategory[firstRoom];
          if (categoryKey) {
            openAvailabilityModal(categoryKey);
          }
        }
      });
    });

  };

  const neToEn = Object.fromEntries(Object.entries(enToNe).map(([k, v]) => [v, k]));

  function translateText(text, targetLang) {
    const trimmed = text.trim();
    if (!trimmed) return text;
    
    if (targetLang === 'ne') {
      return enToNe[trimmed] ? text.replace(trimmed, enToNe[trimmed]) : text;
    } else {
      return neToEn[trimmed] ? text.replace(trimmed, neToEn[trimmed]) : text;
    }
  }

  function walkDOMAndTranslate(node, targetLang) {
    if (node.nodeType === Node.TEXT_NODE) {
      if (node.parentElement && node.parentElement.closest('.lang-btn')) return;
      if (node.parentElement && ['SCRIPT', 'STYLE', 'CODE'].includes(node.parentElement.tagName)) return;
      node.nodeValue = translateText(node.nodeValue, targetLang);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.placeholder) {
         node.placeholder = translateText(node.placeholder, targetLang);
      }
      node.childNodes.forEach(child => walkDOMAndTranslate(child, targetLang));
    }
  }

  function setLanguage(lang) {
    walkDOMAndTranslate(document.body, lang);
    document.documentElement.lang = lang;
  }

  const langBtns = document.querySelectorAll('.lang-btn');
  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const lang = btn.dataset.lang;
      localStorage.setItem('satkar-lang', lang);
      setLanguage(lang);
    });
  });
  
  // Load saved language preference
  const savedLang = localStorage.getItem('satkar-lang');
  if (savedLang) {
    langBtns.forEach(b => {
      b.classList.toggle('active', b.dataset.lang === savedLang);
    });
    // Need to wait for React to finish initial render
    setTimeout(() => setLanguage(savedLang), 100);
  }

  // Use MutationObserver to translate new content generated by React
  const langObserver = new MutationObserver((mutations) => {
    const currentLang = localStorage.getItem('satkar-lang') || 'en';
    if (currentLang === 'en') return; // Default is EN, no need to translate if already EN

    let shouldTranslate = false;
    mutations.forEach(mutation => {
      if (mutation.addedNodes.length > 0) {
        mutation.addedNodes.forEach(node => {
          if (node.nodeType === Node.ELEMENT_NODE && !node.classList?.contains('lang-btn')) {
            shouldTranslate = true;
          } else if (node.nodeType === Node.TEXT_NODE) {
             shouldTranslate = true;
          }
        });
      }
    });

    if (shouldTranslate) {
      langObserver.disconnect(); // Prevent infinite loop
      walkDOMAndTranslate(document.body, currentLang);
      langObserver.observe(document.body, { childList: true, subtree: true, characterData: true });
    }
  });

  // Start observing
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      langObserver.observe(document.body, { childList: true, subtree: true, characterData: true });
    });
  } else {
    langObserver.observe(document.body, { childList: true, subtree: true, characterData: true });
  }
</script>

<!-- Refined Booking Card Script -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      // ========================================
      // BOOKING CARD ANIMATION REVEAL
      // ========================================
      const bookingCard = document.querySelector('.booking-card-refined');
      const bookingFields = document.querySelectorAll('.booking-field-refined');

      if (bookingCard) {
        // Intersection Observer for reveal animation
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              // Reveal the card
              entry.target.classList.add('revealed');

              // Stagger reveal fields
              bookingFields.forEach((field, index) => {
                setTimeout(() => {
                  field.classList.add('revealed');
                }, 100 + (index * 100));
              });

              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.2, rootMargin: '0px 0px -50px 0px' });

        observer.observe(bookingCard);
      }

      // ========================================
      // DATE VALIDATION LOGIC
      // ========================================
      const checkinInput = document.getElementById('booking-checkin');
      const checkoutInput = document.getElementById('booking-checkout');
      const bookingCta = document.getElementById('booking-cta');
      const guestsSelect = document.getElementById('booking-guests');
      const roomSelect = document.getElementById('booking-room');

      // Set minimum date for check-in (today)
      if (checkinInput) {
        const today = new Date().toISOString().split('T')[0];
        checkinInput.setAttribute('min', today);

        // Update check-out minimum when check-in changes
        checkinInput.addEventListener('change', function() {
          if (this.value) {
            const checkinDate = new Date(this.value);
            checkinDate.setDate(checkinDate.getDate() + 1);
            const minCheckout = checkinDate.toISOString().split('T')[0];
            checkoutInput.setAttribute('min', minCheckout);

            // If current check-out is before new minimum, reset it
            if (checkoutInput.value && checkoutInput.value < minCheckout) {
              checkoutInput.value = minCheckout;
            }
          }
        });
      }

      // ========================================
      // PASS VALUES TO CONTACT PAGE
      // ========================================
      if (bookingCta) {
        bookingCta.addEventListener('click', function(e) {
          const checkin = checkinInput?.value || '';
          const checkout = checkoutInput?.value || '';
          const guests = guestsSelect?.value || '';
          const room = roomSelect?.value || '';

          // Build query string with booking data
          const params = new URLSearchParams();
          if (checkin) params.append('checkin', checkin);
          if (checkout) params.append('checkout', checkout);
          if (guests) params.append('guests', guests);
          if (room) params.append('room', room);

          // Update href with parameters
          const baseUrl = this.getAttribute('href');
          this.href = baseUrl + (params.toString() ? '?' + params.toString() : '');
        });
      }

    }, 500); // Wait for React to render
  });
</script>
