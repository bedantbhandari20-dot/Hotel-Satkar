<!doctype html>
<html lang="en-NP">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F0E8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=yes" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Satkar Hotel, Bakery & Cafe — Dipayal, Doti, Nepal</title>
    <meta
      name="description"
      content="Warm rooms, honest food, and a bakery the town wakes up to. Satkar Hotel, Bakery & Cafe in Dipayal, Doti — established 2056 B.S."
    />
    <meta name="author" content="Satkar Hotel" />
    <link rel="canonical" href="https://satkarhotel.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://satkarhotel.com" />
    <meta property="og:title" content="Satkar Hotel, Bakery & Cafe" />
    <meta
      property="og:description"
      content="Warm rooms, honest food, and event spaces in Dipayal, Doti, Nepal."
    />
    <meta property="og:image" content="https://satkarhotel.com/hero/hero-2000.jpg" />
    <meta property="og:locale" content="en_NP" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Satkar Hotel, Bakery & Cafe" />
    <meta name="twitter:description" content="Warm rooms. Honest food. A trusted anchor in Doti." />
    <meta name="twitter:image" content="https://satkarhotel.com/hero/hero-2000.jpg" />

    <!-- Fonts: preconnect + display=swap, plus a preload for the most-used face -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Image host preconnects (Unsplash placeholders) -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!-- Preload hero LCP image (locally hosted) -->
    <link
      rel="preload"
      as="image"
      href="/hero/hero-cafe.jpg"
      fetchpriority="high"
    />

    <!-- Structured data — Hotel + LocalBusiness + sample reviews -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Hotel", "LodgingBusiness", "CafeOrCoffeeShop"],
        "name": "Satkar Hotel, Bakery & Cafe",
        "alternateName": "Satkar",
        "description": "Warm rooms, honest food, and event spaces in Dipayal, Doti, Nepal. Established 2056 B.S.",
        "url": "https://satkarhotel.com",
        "telephone": "+9779851411730",
        "email": "info@satkarhotel.com",
        "foundingDate": "2056",
        "priceRange": "Rs 600 – Rs 2200",
        "currenciesAccepted": "NPR",
        "paymentAccepted": "Cash, Mobile Banking",
        "image": [
          "https://satkarhotel.com/hero/hero-2000.jpg"
        ],
        "logo": "https://satkarhotel.com/favicon.svg",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Dipayal",
          "addressLocality": "Dipayal Silgadhi",
          "addressRegion": "Sudurpashchim Province",
          "postalCode": "10900",
          "addressCountry": "NP"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 29.2619,
          "longitude": 80.8408
        },
        "openingHoursSpecification": [{
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
          "opens": "00:00",
          "closes": "23:59"
        }],
        "amenityFeature": [
          { "@type": "LocationFeatureSpecification", "name": "24/7 Front Desk", "value": true },
          { "@type": "LocationFeatureSpecification", "name": "Bakery", "value": true },
          { "@type": "LocationFeatureSpecification", "name": "Cafe", "value": true },
          { "@type": "LocationFeatureSpecification", "name": "Restaurant", "value": true },
          { "@type": "LocationFeatureSpecification", "name": "Event Space", "value": true }
        ],
        "sameAs": [
          "https://facebook.com/satkarhotel",
          "https://instagram.com/satkarhotel"
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.0",
          "reviewCount": "81",
          "bestRating": "5",
          "worstRating": "1"
        },
        "review": [
          {
            "@type": "Review",
            "reviewRating": { "@type": "Rating", "ratingValue": "5", "bestRating": "5" },
            "author": { "@type": "Person", "name": "Dr. Madhav Rawat" },
            "reviewBody": "Best place for food, bakery and coffee in Dipayal."
          },
          {
            "@type": "Review",
            "reviewRating": { "@type": "Rating", "ratingValue": "5", "bestRating": "5" },
            "author": { "@type": "Person", "name": "Sebika Thapa" },
            "reviewBody": "Probably one and only barista cafe in Dipayal. I tried wai wai sadheko, chips chilly, cappuccino, lava cake, and chicken khana set too — everything tasted good!"
          },
          {
            "@type": "Review",
            "reviewRating": { "@type": "Rating", "ratingValue": "4", "bestRating": "5" },
            "author": { "@type": "Person", "name": "Bikalpa Pokhrel" },
            "reviewBody": "Very modern and nice, beautiful place in Dipayal. This is the only modern restaurant and Cafe in Dipayal. Food is also very good."
          }
        ]
      }
    </script>
    <script>
      (function(){
        try{
          var s=localStorage.getItem('satkar:theme');
          var m=window.matchMedia('(prefers-color-scheme: dark)').matches;
          if(s==='dark'||(!s&&m))document.documentElement.classList.add('dark');
        }catch(_){}
      })();
    </script>
  </head>
  <body class="antialiased">
    <noscript>
      <div style="padding:2rem;text-align:center;background:#F5F0E8;color:#2C2418;font-family:'Space Grotesk','Noto Sans Devanagari',Inter,sans-serif">
        Satkar requires JavaScript to display this page properly. Please call us directly at +977 985 141 1730.
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
